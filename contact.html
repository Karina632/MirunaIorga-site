    <script src="/js/gdpr.js" defer></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>


<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
/* =========================
   EMAILJS INIT
========================= */
(function () {
  emailjs.init("tlec_1oGBFpkm4TF0");
})();

/* =========================
   HELPERS
========================= */
function sanitizeInput(str) {
  return str
    .replace(/[<>]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function isValidPhone(phone) {
  return /^07\d{8}$/.test(phone);
}

const form = document.getElementById("contact-form");
const status = document.getElementById("form-status");
const button = form.querySelector("button");

function clearErrors() {
  form.querySelectorAll("input, textarea").forEach(field => {
    field.classList.remove("input-error");
  });
}

/* Elimină eroarea live când userul scrie */
form.querySelectorAll("input, textarea").forEach(field => {
  field.addEventListener("input", () => {
    field.classList.remove("input-error");
    status.innerText = "";
  });
});

/* =========================
   RATE LIMIT
========================= */
let lastSubmitTime = 0;

/* =========================
   FORM LOGIC
========================= */
form.addEventListener("submit", function (e) {
  e.preventDefault();

  clearErrors();

  /* HONEYPOT CHECK */
  if (form.website && form.website.value) {
    return;
  }

  /* RATE LIMIT (5 sec) */
  const now = Date.now();
  if (now - lastSubmitTime < 5000) {
    status.innerText = "Te rugăm așteaptă câteva secunde înainte de o nouă trimitere.";
    return;
  }

  /* INPUTS */
  const nameInput = form.querySelector('input[name="name"]');
  const emailInput = form.querySelector('input[name="email"]');
  const phoneInput = form.querySelector('input[name="phone"]');
  const messageInput = form.querySelector('textarea[name="message"]');

  /* SANITIZE */
  nameInput.value = sanitizeInput(nameInput.value);
  emailInput.value = sanitizeInput(emailInput.value);
  phoneInput.value = sanitizeInput(phoneInput.value);
  messageInput.value = sanitizeInput(messageInput.value);

  /* VALIDATION */
  if (nameInput.value.length < 2) {
    status.style.color = "red";
    status.innerText = "Introdu un nume valid.";
    nameInput.classList.add("input-error");
    return;
  }

  if (!isValidEmail(emailInput.value)) {
    status.style.color = "red";
    status.innerText = "Introdu o adresă de email validă.";
    emailInput.classList.add("input-error");
    return;
  }

  if (!isValidPhone(phoneInput.value)) {
    status.style.color = "red";
    status.innerText = "Numărul trebuie să înceapă cu 07 și să conțină 10 cifre.";
    phoneInput.classList.add("input-error");
    return;
  }

  if (messageInput.value.length < 10) {
    status.style.color = "red";
    status.innerText = "Mesajul este prea scurt.";
    messageInput.classList.add("input-error");
    return;
  }

  /* LOADING */
  button.innerText = "Se trimite...";
  button.disabled = true;
  status.innerText = "";

  /* SEND EMAIL */
  emailjs.sendForm("service_pcjkaor", "template_3oxa22k", form)
    .then(() => {
      status.style.color = "green";
      status.innerText = "Mesaj trimis cu succes!";
      form.reset();
      lastSubmitTime = Date.now();
    })
    .catch(() => {
      status.style.color = "red";
      status.innerText = "A apărut o eroare. Încearcă din nou.";
    })
    .finally(() => {
      button.innerText = "Trimite mesaj";
      button.disabled = false;
    });
});
</script>

</body>
</html>
